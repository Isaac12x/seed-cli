name: ci-cd
on:
  push:
    branches:
      - "release/v*"
    tags:
      - "v*"
jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/seed-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            tag="${BASH_REMATCH[1]}"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No matching tag found for ${GITHUB_REF_NAME}; skipping publish."
          fi
      - uses: actions/setup-python@v5
        if: steps.release.outputs.publish == 'true'
        with: { python-version: "3.12" }
      - if: steps.release.outputs.publish == 'true'
        run: python -m pip install -U pip hatch twine
      - if: steps.release.outputs.publish == 'true'
        run: rm -rf dist/
      - if: steps.release.outputs.publish == 'true'
        run: hatch build
      - name: Publish package distributions to PyPI
        if: steps.release.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
